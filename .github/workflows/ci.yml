name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# По умолчанию GITHUB_TOKEN получает write-all — сужаем до чтения
permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      # Те же команды, что разработчик гоняет локально
      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Tests
        run: uv run pytest
