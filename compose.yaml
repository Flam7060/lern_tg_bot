services:
  bot:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    # Запретить процессам повышать привилегии внутри контейнера
    security_opt:
      - no-new-privileges:true
    # Сбросить все Linux capabilities
    cap_drop:
      - ALL

    # Авто-перезапуск при изменении кода. `docker compose watch`;
    # обычный `up` это игнорирует
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app

# Когда появятся БД/Redis — добавляются сюда же как новые сервисы,
