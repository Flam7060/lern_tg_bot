services:
  bot:
    build: .
    # BOT_TOKEN и прочие переменные берутся из .env рядом с этим файлом
    env_file:
      - .env
    restart: unless-stopped
    # Бот только исходящие запросы делает (long polling) — порты наружу не нужны

# Когда появятся БД/Redis — добавляются сюда же как новые сервисы,
# а bot получает depends_on: [db] и связь по имени сервиса.
